name: Bump — Super Parrain (1x/jour)
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 📦 Dépendances
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: 🚀 Bump Super Parrain
        env:
          SUPER_PARRAIN_EMAIL:    ${{ secrets.SUPER_PARRAIN_EMAIL }}
          SUPER_PARRAIN_PASSWORD: ${{ secrets.SUPER_PARRAIN_PASSWORD }}
          TARGET_SITES:           "super"
        run: python bumper.py
      - name: 📋 Logs
        if: always()
        run: cat bumper.log || true
      - name: 💾 Sauvegarder heure du run
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_super_run.txt || true
          git diff --staged --quiet || git commit -m "Update last super run time"
          git push || true
