name: Bump — Code Parrainage & Parrainage.co (5x/jour)
on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 📦 Dépendances
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: 🚀 Bump Code Parrainage & Parrainage.co
        env:
          TWOCAPTCHA_KEY:            ${{ secrets.TWOCAPTCHA_KEY }}
          CODE_PARRAINAGE_EMAIL:     ${{ secrets.CODE_PARRAINAGE_EMAIL }}
          CODE_PARRAINAGE_PASSWORD:  ${{ secrets.CODE_PARRAINAGE_PASSWORD }}
          PARRAINAGE_CO_EMAIL:       ${{ secrets.PARRAINAGE_CO_EMAIL }}
          PARRAINAGE_CO_PASSWORD:    ${{ secrets.PARRAINAGE_CO_PASSWORD }}
          PARRAINAGE_CO_COOKIES:     ${{ secrets.PARRAINAGE_CO_COOKIES }}
          TARGET_SITES:              "code,parrainage"
          DISPLAY:                   ":99"
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          python bumper.py
      - name: 📋 Logs
        if: always()
        run: cat bumper.log || true
      - name: Upload debug captcha
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-captcha
          path: |
            debug_bg.png
            debug_piece.png
            debug_parrainage_login.png
            debug_parrainage_avant.png
            debug_parrainage_apres.png
